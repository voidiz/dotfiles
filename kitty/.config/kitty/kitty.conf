# vim:fileencoding=utf-8:ft=conf:foldmethod=marker

shell_integration enabled

# Font
font_family         JetBrains Mono
font_size           11.5
adjust_line_height  100%

map kitty_mod+plus      change_font_size all +1.0
map kitty_mod+0         change_font_size all 0

# Audio
enable_audio_bell no

# Window style
remember_window_size    no
initial_window_width    960
initial_window_height   560
window_padding_width    15.0

# Tab bar styling
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_margin_width    15.0
tab_bar_margin_height   5.0 0
active_tab_font_style   none
tab_title_template      {session_name} {title}

# Only show tabs belonging to the current session or no session
tab_bar_filter          session:~ or session:^$

# Always show the tab bar
# tab_bar_min_tabs        1

# Theme
include                 themes/rosebones_dark.conf
background_opacity      1

# OS window management
map ctrl+alt+enter      new_os_window_with_cwd

# Kitty window management
map ctrl+shift+enter    new_window_with_cwd
# map ctrl+alt+h          neighboring_window left
# map ctrl+alt+j          neighboring_window down
# map ctrl+alt+k          neighboring_window up
# map ctrl+alt+l          neighboring_window right
map ctrl+;              kitten kittens/toggle_terminal.py
map ctrl+odiaeresis     kitten kittens/toggle_terminal.py

# Scroll speed
touch_scroll_multiplier 8.0

# Tab management
# map alt+j               new_tab_with_cwd
# map alt+h               previous_tab
# map alt+l               next_tab
# map shift+alt+h         move_tab_backward
# map shift+alt+l         move_tab_forward
# map alt+1               goto_tab 1
# map alt+2               goto_tab 2
# map alt+3               goto_tab 3
# map alt+4               goto_tab 4
# map alt+5               goto_tab 5
# map alt+6               goto_tab 6
# map alt+7               goto_tab 7
# map alt+8               goto_tab 8
# map alt+9               goto_tab 9
# map alt+0               goto_tab 10

# Session management
map alt+w               kitten kittens/session.py --restore
map alt+q               kitten kittens/session.py --save

# Command palette
map ctrl+shift+p        command_palette

# Neovim passthrough (escape sequences for the following keys)
# map ctrl+shift+i    send_text all \x1b[73;5u
# map ctrl+shift+n    send_text all \x1b[78;5u
# map ctrl+shift+o    send_text all \x1b[79;5u

# Tmux "integration"
# Kitty Window Management (panes in tmux)
map ctrl+shift+o        no_op
map ctrl+shift+n        no_op
map ctrl+alt+h          kitten kittens/if_not_tmux.py neighboring_window left ctrl+alt+h
map ctrl+alt+j          kitten kittens/if_not_tmux.py neighboring_window down ctrl+alt+j
map ctrl+alt+k          kitten kittens/if_not_tmux.py neighboring_window up ctrl+alt+k
map ctrl+alt+l          kitten kittens/if_not_tmux.py neighboring_window right ctrl+alt+l

# Tab Management (windows in tmux)
map alt+j               kitten kittens/if_not_tmux.py new_tab_with_cwd alt+j
map alt+h               kitten kittens/if_not_tmux.py previous_tab alt+h
map alt+l               kitten kittens/if_not_tmux.py next_tab alt+l
map shift+alt+h         kitten kittens/if_not_tmux.py move_tab_backward shift+alt+h
map shift+alt+l         kitten kittens/if_not_tmux.py move_tab_forward shift+alt+l

# Tab navigation in kitty + tmux
map alt+1               kitten kittens/if_not_tmux.py goto_tab 1 alt+1
map alt+2               kitten kittens/if_not_tmux.py goto_tab 2 alt+2
map alt+3               kitten kittens/if_not_tmux.py goto_tab 3 alt+3
map alt+4               kitten kittens/if_not_tmux.py goto_tab 4 alt+4
map alt+5               kitten kittens/if_not_tmux.py goto_tab 5 alt+5
map alt+6               kitten kittens/if_not_tmux.py goto_tab 6 alt+6
map alt+7               kitten kittens/if_not_tmux.py goto_tab 7 alt+7
map alt+8               kitten kittens/if_not_tmux.py goto_tab 8 alt+8
map alt+9               kitten kittens/if_not_tmux.py goto_tab 9 alt+9
map alt+0               kitten kittens/if_not_tmux.py goto_tab 10 alt+0

# Sessions
# map alt+j               kitten kittens/workspaces/session.py new_tab
# map ctrl+shift+enter    kitten kittens/workspaces/session.py new_window
# map ctrl+shift+o        kitten kittens/workspaces/picker.py
# map shift+alt+h         kitten kittens/workspaces/session.py move_tab backward
# map shift+alt+l         kitten kittens/workspaces/session.py move_tab forward
# map ctrl+shift+i        goto_session -1
# watcher                 kittens/workspaces/watcher.py
